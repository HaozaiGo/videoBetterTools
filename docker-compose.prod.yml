name: model-plaza

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-model_plaza}
      POSTGRES_USER: ${POSTGRES_USER:-model_plaza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-model_plaza}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-model_plaza} -d ${POSTGRES_DB:-model_plaza}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data

  api:
    image: model-plaza-api:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: unless-stopped
    command: sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8010"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-model_plaza}:${POSTGRES_PASSWORD:-model_plaza}@postgres:5432/${POSTGRES_DB:-model_plaza}
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /data/uploads
      PUBLIC_UPLOAD_PREFIX: /uploads
      AUTH_SECRET: ${AUTH_SECRET}
      ALLOW_DEMO_WITHOUT_AUTH: ${ALLOW_DEMO_WITHOUT_AUTH:-false}
      PROPAINTER_COMMAND: ${PROPAINTER_COMMAND:-python /app/scripts/gpu/propainter_api_adapter.py}
      ENHANCE_COMMAND: ${ENHANCE_COMMAND:-python /app/scripts/gpu/video_enhance_api_adapter.py}
      TRANSLATE_COMMAND: ${TRANSLATE_COMMAND:-python /app/scripts/gpu/video_translate_api_adapter.py}
      MODEL_PLAZA_CALLBACK_URL: ${MODEL_PLAZA_CALLBACK_URL:-http://api:8010/api/provider/callback}
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    image: model-plaza-api:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: unless-stopped
    command: python -m app.worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-model_plaza}:${POSTGRES_PASSWORD:-model_plaza}@postgres:5432/${POSTGRES_DB:-model_plaza}
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /data/uploads
      PUBLIC_UPLOAD_PREFIX: /uploads
      AUTH_SECRET: ${AUTH_SECRET}
      ALLOW_DEMO_WITHOUT_AUTH: ${ALLOW_DEMO_WITHOUT_AUTH:-false}
      PROPAINTER_COMMAND: ${PROPAINTER_COMMAND:-python /app/scripts/gpu/propainter_api_adapter.py}
      ENHANCE_COMMAND: ${ENHANCE_COMMAND:-python /app/scripts/gpu/video_enhance_api_adapter.py}
      TRANSLATE_COMMAND: ${TRANSLATE_COMMAND:-python /app/scripts/gpu/video_translate_api_adapter.py}
    volumes:
      - uploads:/data/uploads
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_started

  web:
    image: model-plaza-web:${APP_VERSION:-latest}
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8003}:80"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  uploads:
