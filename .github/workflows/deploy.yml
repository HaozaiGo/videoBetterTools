name: Deploy

on:
  push:
    branches:
      - main
      - release/2026-06
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref_name }}
  cancel-in-progress: true

env:
  DEPLOY_PORT: "22"

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Configure deployment target
        run: |
          case "$GITHUB_REF_NAME" in
            main)
              {
                echo "DEPLOY_HOST=35.220.200.97"
                echo "DEPLOY_USER=huangguojie"
                echo "DEPLOY_DIR=/opt/videoBetterTools"
                echo "DEPLOY_BUILD_MIRRORS=0"
              } >> "$GITHUB_ENV"
              ;;
            release/2026-06)
              {
                echo "DEPLOY_HOST=101.96.226.213"
                echo "DEPLOY_USER=root"
                echo "DEPLOY_DIR=/opt/modelPlaza"
                echo "DEPLOY_BUILD_MIRRORS=1"
              } >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unsupported deployment branch: $GITHUB_REF_NAME" >&2
              exit 1
              ;;
          esac

      - name: Prepare SSH key
        env:
          MAIN_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          RELEASE_SSH_PRIVATE_KEY: ${{ secrets.RELEASE_DEPLOY_SSH_KEY }}
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            SSH_PRIVATE_KEY="$MAIN_SSH_PRIVATE_KEY"
          else
            SSH_PRIVATE_KEY="$RELEASE_SSH_PRIVATE_KEY"
          fi
          test -n "$SSH_PRIVATE_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Ensure Docker on release host
        if: github.ref_name == 'release/2026-06'
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          if ! command -v docker >/dev/null 2>&1; then
            if ! command -v apt-get >/dev/null 2>&1; then
              echo "Docker is not installed, and automatic installation currently supports only apt-based Linux hosts." >&2
              exit 1
            fi

            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose-v2
          fi

          mkdir -p /etc/docker
          cat > /etc/docker/daemon.json <<'EOF'
          {
            "registry-mirrors": [
              "https://docker.m.daocloud.io",
              "https://docker.1ms.run",
              "https://dockerpull.cn"
            ]
          }
          EOF

          if command -v systemctl >/dev/null 2>&1; then
            systemctl enable docker
            systemctl restart docker
          fi

          docker --version
          docker compose version
          REMOTE

      - name: Create source archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='data' \
            --exclude='backend/.venv' \
            --exclude='backend/.env' \
            --exclude='backend/.pytest_cache' \
            --exclude='**/__pycache__' \
            -czf /tmp/model-plaza-release.tar.gz .

      - name: Upload archive
        run: |
          if [ "$DEPLOY_USER" = "root" ]; then
            prepare_remote="mkdir -p '$DEPLOY_DIR/releases' '$DEPLOY_DIR/shared'"
          else
            prepare_remote="sudo mkdir -p '$DEPLOY_DIR/releases' '$DEPLOY_DIR/shared' && sudo chown -R '$DEPLOY_USER':'$DEPLOY_USER' '$DEPLOY_DIR'"
          fi
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "$prepare_remote"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" /tmp/model-plaza-release.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/release.tar.gz"

      - name: Deploy with Docker Compose
        env:
          MAIN_PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
          RELEASE_PRODUCTION_ENV: ${{ secrets.RELEASE_PRODUCTION_ENV }}
        run: |
          if [ "$GITHUB_REF_NAME" = "main" ]; then
            PRODUCTION_ENV="$MAIN_PRODUCTION_ENV"
          else
            PRODUCTION_ENV="$RELEASE_PRODUCTION_ENV"
          fi
          production_env_b64="$(printf '%s' "${PRODUCTION_ENV:-}" | base64 -w 0)"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_DIR='$DEPLOY_DIR' GITHUB_SHA='$GITHUB_SHA' PRODUCTION_ENV_B64='$production_env_b64' DEPLOY_BUILD_MIRRORS='${DEPLOY_BUILD_MIRRORS:-0}' bash -s" <<'REMOTE'
          set -euo pipefail

          release_dir="$DEPLOY_DIR/releases/$GITHUB_SHA"
          shared_env="$DEPLOY_DIR/shared/.env"

          mkdir -p "$release_dir" "$DEPLOY_DIR/shared"
          tar -xzf "$DEPLOY_DIR/release.tar.gz" -C "$release_dir"

          if [ -n "${PRODUCTION_ENV_B64:-}" ]; then
            printf '%s' "$PRODUCTION_ENV_B64" | base64 -d > "$shared_env"
          elif [ ! -f "$shared_env" ]; then
            auth_secret="$(openssl rand -hex 32)"
            postgres_password="$(openssl rand -hex 24)"
            cat > "$shared_env" <<EOF
          POSTGRES_DB=model_plaza
          POSTGRES_USER=model_plaza
          POSTGRES_PASSWORD=$postgres_password
          AUTH_SECRET=$auth_secret
          ALLOW_DEMO_WITHOUT_AUTH=false
          WEB_PORT=8003
          WORKER_REPLICAS=8
          TASK_JOB_TIMEOUT_SECONDS=7200
          MODEL_PLAZA_GPU_API_URL=http://32.196.46.122:18080
          MODEL_PLAZA_GPU_API_KEY=model-plaza-dev-gpu-key
          MODEL_PLAZA_CALLBACK_URL=http://api:8010/api/provider/callback
          STORAGE_BACKEND=local
          EOF
          fi

          if [ -z "${PRODUCTION_ENV_B64:-}" ]; then
            if grep -Eq '^WEB_PORT=(80|18081)$' "$shared_env"; then
              sed -i 's/^WEB_PORT=.*/WEB_PORT=8003/' "$shared_env"
            elif ! grep -q '^WEB_PORT=' "$shared_env"; then
              printf '\nWEB_PORT=8003\n' >> "$shared_env"
            fi
          fi

          if [ "${DEPLOY_BUILD_MIRRORS:-0}" = "1" ]; then
            ensure_env() {
              key="$1"
              value="$2"
              if grep -q "^${key}=" "$shared_env"; then
                sed -i "s|^${key}=.*|${key}=${value}|" "$shared_env"
              else
                printf '\n%s=%s\n' "$key" "$value" >> "$shared_env"
              fi
            }

            ensure_env APT_MIRROR http://mirrors.ivolces.com/debian
            ensure_env APT_SECURITY_MIRROR http://mirrors.ivolces.com/debian-security
            ensure_env PYPI_INDEX_URL https://mirrors.aliyun.com/pypi/simple
            ensure_env UV_SYNC_ARGS "--upgrade"
            ensure_env UV_BASE_IMAGE ghcr.nju.edu.cn/astral-sh/uv:python3.12-bookworm-slim
            ensure_env NPM_REGISTRY https://registry.npmmirror.com
          fi

          ln -sfn "$shared_env" "$release_dir/.env"
          cd "$release_dir"

          worker_replicas="$(grep -E '^WORKER_REPLICAS=' .env | tail -n 1 | cut -d= -f2- || true)"
          worker_replicas="${worker_replicas:-3}"
          APP_VERSION="$GITHUB_SHA" docker compose -f docker-compose.prod.yml up -d --build --remove-orphans --scale "worker=$worker_replicas"
          docker compose -f docker-compose.prod.yml ps

          ln -sfn "$release_dir" "$DEPLOY_DIR/current"
          rm -f "$DEPLOY_DIR/release.tar.gz"
          rm -f "$DEPLOY_DIR/images.tar.gz"
          rm -rf "$DEPLOY_DIR/image-parts"
          find "$DEPLOY_DIR/releases" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
          docker image prune -f
          REMOTE
