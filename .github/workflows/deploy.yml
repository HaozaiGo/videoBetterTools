name: Deploy

on:
  push:
    branches:
      - main
      - release/**
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        default: production
        options:
          - production
          - release

concurrency:
  group: deploy-${{ github.event.inputs.target || github.ref_name }}
  cancel-in-progress: true

env:
  PRODUCTION_DEPLOY_HOST: 35.241.99.69
  RELEASE_DEPLOY_HOST: 101.96.226.213
  DEPLOY_USER: huangguojie
  DEPLOY_PORT: "22"
  DEPLOY_DIR: /opt/videoBetterTools

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Resolve deploy target
        env:
          WORKFLOW_TARGET: ${{ github.event.inputs.target || '' }}
        run: |
          target="${WORKFLOW_TARGET:-production}"
          if [ "$GITHUB_REF_NAME" != "main" ] && [[ "$GITHUB_REF_NAME" == release/* ]]; then
            target="release"
          fi

          if [ "$target" = "release" ]; then
            echo "DEPLOY_ENV=release" >> "$GITHUB_ENV"
            echo "DEPLOY_HOST=$RELEASE_DEPLOY_HOST" >> "$GITHUB_ENV"
          else
            echo "DEPLOY_ENV=production" >> "$GITHUB_ENV"
            echo "DEPLOY_HOST=$PRODUCTION_DEPLOY_HOST" >> "$GITHUB_ENV"
          fi

          echo "Deploy target: $target"

      - name: Prepare SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          RELEASE_DEPLOY_SSH_KEY: ${{ secrets.RELEASE_DEPLOY_SSH_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ "$DEPLOY_ENV" = "release" ]; then
            private_key="${RELEASE_DEPLOY_SSH_KEY:-}"
            missing_secret="RELEASE_DEPLOY_SSH_KEY"
          else
            private_key="${DEPLOY_SSH_KEY:-${SSH_PRIVATE_KEY:-}}"
            missing_secret="DEPLOY_SSH_KEY"
          fi
          if [ -z "$private_key" ]; then
            echo "Missing repository secret: set $missing_secret to the SSH private key used for $DEPLOY_ENV deploy."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$private_key" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Create source archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='data' \
            --exclude='backend/.venv' \
            --exclude='backend/.env' \
            --exclude='backend/.pytest_cache' \
            --exclude='**/__pycache__' \
            -czf /tmp/model-plaza-release.tar.gz .

      - name: Upload archive
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "sudo mkdir -p '$DEPLOY_DIR/releases' '$DEPLOY_DIR/shared' && sudo chown -R '$DEPLOY_USER':'$DEPLOY_USER' '$DEPLOY_DIR'"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" /tmp/model-plaza-release.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/release.tar.gz"

      - name: Deploy with Docker Compose
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          production_env_b64="$(printf '%s' "${PRODUCTION_ENV:-}" | base64 -w 0)"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_DIR='$DEPLOY_DIR' GITHUB_SHA='$GITHUB_SHA' PRODUCTION_ENV_B64='$production_env_b64' bash -s" <<'REMOTE'
          set -euo pipefail

          release_dir="$DEPLOY_DIR/releases/$GITHUB_SHA"
          shared_env="$DEPLOY_DIR/shared/.env"

          mkdir -p "$release_dir" "$DEPLOY_DIR/shared"
          tar -xzf "$DEPLOY_DIR/release.tar.gz" -C "$release_dir"

          if [ -n "${PRODUCTION_ENV_B64:-}" ]; then
            printf '%s' "$PRODUCTION_ENV_B64" | base64 -d > "$shared_env"
          elif [ ! -f "$shared_env" ]; then
            auth_secret="$(openssl rand -hex 32)"
            postgres_password="$(openssl rand -hex 24)"
            cat > "$shared_env" <<EOF
          POSTGRES_DB=model_plaza
          POSTGRES_USER=model_plaza
          POSTGRES_PASSWORD=$postgres_password
          AUTH_SECRET=$auth_secret
          ALLOW_DEMO_WITHOUT_AUTH=false
          WEB_PORT=8003
          WORKER_REPLICAS=8
          TASK_JOB_TIMEOUT_SECONDS=7200
          MODEL_PLAZA_GPU_API_URL=http://32.196.46.122:18081
          MODEL_PLAZA_GPU_API_KEY=model-plaza-dev-gpu-key
          MODEL_PLAZA_CALLBACK_URL=http://api:8010/api/provider/callback
          STORAGE_BACKEND=local
          EOF
          fi

          if grep -q '^MODEL_PLAZA_GPU_API_URL=.*:18080' "$shared_env"; then
            sed -i 's#:18080#:18081#' "$shared_env"
          fi

          if [ -z "${PRODUCTION_ENV_B64:-}" ]; then
            if grep -Eq '^WEB_PORT=(80|18081)$' "$shared_env"; then
              sed -i 's/^WEB_PORT=.*/WEB_PORT=8003/' "$shared_env"
            elif ! grep -q '^WEB_PORT=' "$shared_env"; then
              printf '\nWEB_PORT=8003\n' >> "$shared_env"
            fi
          fi

          ln -sfn "$shared_env" "$release_dir/.env"
          cd "$release_dir"

          worker_replicas="$(grep -E '^WORKER_REPLICAS=' .env | tail -n 1 | cut -d= -f2- || true)"
          worker_replicas="${worker_replicas:-3}"
          docker compose -f docker-compose.prod.yml up -d --build --remove-orphans --scale "worker=$worker_replicas"
          docker compose -f docker-compose.prod.yml ps

          ln -sfn "$release_dir" "$DEPLOY_DIR/current"
          rm -f "$DEPLOY_DIR/release.tar.gz"
          current_release="$(readlink -f "$DEPLOY_DIR/current")"
          find "$DEPLOY_DIR/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
            | sort -rn \
            | cut -d' ' -f2- \
            | awk -v current="$current_release" 'NR > 5 && $0 != current { print }' \
            | xargs -r rm -rf
          docker image prune -f
          REMOTE
