name: Deploy

on:
  push:
    branches:
      - main
      - release/**
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        default: production
        options:
          - production
          - release

concurrency:
  group: deploy-${{ github.event.inputs.target || github.ref_name }}
  cancel-in-progress: true

env:
  PRODUCTION_DEPLOY_HOST: 35.241.105.124
  RELEASE_DEPLOY_HOST: 101.96.226.213
  DEPLOY_PORT: "22"

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Resolve deploy target
        env:
          WORKFLOW_TARGET: ${{ github.event.inputs.target || '' }}
        run: |
          target="${WORKFLOW_TARGET:-production}"
          if [ "$GITHUB_REF_NAME" != "main" ] && [[ "$GITHUB_REF_NAME" == release/* ]]; then
            target="release"
          fi

          if [ "$target" = "release" ]; then
            {
              echo "DEPLOY_ENV=release"
              echo "DEPLOY_HOST=$RELEASE_DEPLOY_HOST"
              echo "DEPLOY_USER=root"
              echo "DEPLOY_DIR=/opt/modelPlaza"
              echo "DEPLOY_BUILD_MIRRORS=1"
              echo "DEPLOY_WEB_PORT=80"
            } >> "$GITHUB_ENV"
          else
            {
              echo "DEPLOY_ENV=production"
              echo "DEPLOY_HOST=$PRODUCTION_DEPLOY_HOST"
              echo "DEPLOY_USER=huangguojie"
              echo "DEPLOY_DIR=/opt/videoBetterTools"
              echo "DEPLOY_BUILD_MIRRORS=0"
              echo "DEPLOY_WEB_PORT=8003"
            } >> "$GITHUB_ENV"
          fi

          echo "Deploy target: $target"

      - name: Prepare SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          RELEASE_DEPLOY_SSH_KEY: ${{ secrets.RELEASE_DEPLOY_SSH_KEY }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ "$DEPLOY_ENV" = "release" ]; then
            private_key="${RELEASE_DEPLOY_SSH_KEY:-}"
            missing_secret="RELEASE_DEPLOY_SSH_KEY"
          else
            private_key="${DEPLOY_SSH_KEY:-${SSH_PRIVATE_KEY:-}}"
            missing_secret="DEPLOY_SSH_KEY"
          fi
          if [ -z "$private_key" ]; then
            echo "Missing repository secret: set $missing_secret to the SSH private key used for $DEPLOY_ENV deploy."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$private_key" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Ensure Docker on release host
        if: startsWith(github.ref_name, 'release/')
        run: |
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          if ! command -v docker >/dev/null 2>&1; then
            if ! command -v apt-get >/dev/null 2>&1; then
              echo "Docker is not installed, and automatic installation currently supports only apt-based Linux hosts." >&2
              exit 1
            fi

            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose-v2
          fi

          mkdir -p /etc/docker
          cat > /etc/docker/daemon.json <<'EOF'
          {
            "registry-mirrors": [
              "https://docker.m.daocloud.io",
              "https://docker.1ms.run",
              "https://dockerpull.cn"
            ]
          }
          EOF

          if command -v systemctl >/dev/null 2>&1; then
            systemctl enable docker
            systemctl restart docker
          fi

          docker --version
          docker compose version
          REMOTE

      - name: Create source archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='data' \
            --exclude='backend/.venv' \
            --exclude='backend/.env' \
            --exclude='backend/.pytest_cache' \
            --exclude='**/__pycache__' \
            -czf /tmp/model-plaza-release.tar.gz .

      - name: Upload archive
        run: |
          if [ "$DEPLOY_USER" = "root" ]; then
            prepare_remote="mkdir -p '$DEPLOY_DIR/releases' '$DEPLOY_DIR/shared'"
          else
            prepare_remote="sudo mkdir -p '$DEPLOY_DIR/releases' '$DEPLOY_DIR/shared' && sudo chown -R '$DEPLOY_USER':'$DEPLOY_USER' '$DEPLOY_DIR'"
          fi
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "$prepare_remote"
          scp -i ~/.ssh/deploy_key -P "$DEPLOY_PORT" /tmp/model-plaza-release.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_DIR/release.tar.gz"

      - name: Deploy with Docker Compose
        env:
          MAIN_PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
          RELEASE_PRODUCTION_ENV: ${{ secrets.RELEASE_PRODUCTION_ENV }}
        run: |
          if [ "$DEPLOY_ENV" = "release" ]; then
            PRODUCTION_ENV="$RELEASE_PRODUCTION_ENV"
          else
            PRODUCTION_ENV="$MAIN_PRODUCTION_ENV"
          fi
          production_env_b64="$(printf '%s' "${PRODUCTION_ENV:-}" | base64 -w 0)"
          main_env_b64="$(printf '%s' "${MAIN_PRODUCTION_ENV:-}" | base64 -w 0)"
          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "DEPLOY_DIR='$DEPLOY_DIR' GITHUB_SHA='$GITHUB_SHA' PRODUCTION_ENV_B64='$production_env_b64' MAIN_PRODUCTION_ENV_B64='$main_env_b64' DEPLOY_BUILD_MIRRORS='${DEPLOY_BUILD_MIRRORS:-0}' DEPLOY_WEB_PORT='${DEPLOY_WEB_PORT:-8003}' bash -s" <<'REMOTE'
          set -euo pipefail

          release_dir="$DEPLOY_DIR/releases/$GITHUB_SHA"
          shared_env="$DEPLOY_DIR/shared/.env"

          mkdir -p "$release_dir" "$DEPLOY_DIR/shared"
          tar -xzf "$DEPLOY_DIR/release.tar.gz" -C "$release_dir"

          if [ -n "${PRODUCTION_ENV_B64:-}" ]; then
            printf '%s' "$PRODUCTION_ENV_B64" | base64 -d > "$shared_env"
          elif [ ! -f "$shared_env" ]; then
            auth_secret="$(openssl rand -hex 32)"
            postgres_password="$(openssl rand -hex 24)"
            cat > "$shared_env" <<EOF
          POSTGRES_DB=model_plaza
          POSTGRES_USER=model_plaza
          POSTGRES_PASSWORD=$postgres_password
          AUTH_SECRET=$auth_secret
          ALLOW_DEMO_WITHOUT_AUTH=false
          WEB_PORT=$DEPLOY_WEB_PORT
          WORKER_REPLICAS=8
          TASK_JOB_TIMEOUT_SECONDS=7200
          ASSET_RETENTION_HOURS=48
          CLEANUP_RETENTION_HOURS=48
          CLEANUP_INTERVAL_SECONDS=3600
          INTERNAL_BATCH_ZIP_RETENTION_HOURS=12
          INTERNAL_BATCH_ZIP_PART_MAX_BYTES=10737418240
          CLEANUP_DISK_HIGH_WATERMARK_PERCENT=80
          CLEANUP_DISK_LOW_WATERMARK_PERCENT=75
          CLEANUP_DISK_MIN_AGE_HOURS=6
          VOLCENGINE_TOS_PRESIGN_EXPIRES_SECONDS=21600
          MODEL_PLAZA_GPU_API_URL=http://32.196.46.122:18081
          MODEL_PLAZA_GPU_API_KEY=model-plaza-dev-gpu-key
          MODEL_PLAZA_CALLBACK_URL=http://api:8010/api/provider/callback
          MODEL_PLAZA_GPU_STALL_TIMEOUT_SECONDS=1800
          MODEL_PLAZA_GPU_STATUS_FAILURES=12
          MODEL_PLAZA_GPU_DOWNLOAD_RETRIES=3
          MODEL_PLAZA_GPU_DOWNLOAD_RETRY_BACKOFF_SECONDS=5
          STORAGE_BACKEND=tos
          EOF
          fi

          if grep -q '^MODEL_PLAZA_GPU_API_URL=.*:18080' "$shared_env"; then
            sed -i 's#:18080#:18081#' "$shared_env"
          fi

          set_env_value() {
            key="$1"
            value="$2"
            if grep -q "^${key}=" "$shared_env"; then
              sed -i "s|^${key}=.*|${key}=${value}|" "$shared_env"
            else
              printf '\n%s=%s\n' "$key" "$value" >> "$shared_env"
            fi
          }

          main_env_file=""
          if [ -n "${MAIN_PRODUCTION_ENV_B64:-}" ]; then
            main_env_file="$(mktemp)"
            printf '%s' "$MAIN_PRODUCTION_ENV_B64" | base64 -d > "$main_env_file"
          fi

          set_env_from_main() {
            key="$1"
            if [ -n "$main_env_file" ] && value="$(awk -v key="$key" 'index($0, key "=") == 1 { print substr($0, length(key) + 2); found=1 } END { exit found ? 0 : 1 }' "$main_env_file")"; then
              set_env_value "$key" "$value"
            fi
          }

          if [ -z "${PRODUCTION_ENV_B64:-}" ]; then
            set_env_value WEB_PORT "$DEPLOY_WEB_PORT"
          fi

          set_env_value STORAGE_BACKEND tos
          set_env_value MODEL_PLAZA_GPU_API_URL http://32.196.46.122:18081
          set_env_value ASSET_RETENTION_HOURS 48
          set_env_value CLEANUP_RETENTION_HOURS 48
          set_env_value CLEANUP_INTERVAL_SECONDS 3600
          set_env_value INTERNAL_BATCH_ZIP_RETENTION_HOURS 12
          set_env_value INTERNAL_BATCH_ZIP_PART_MAX_BYTES 10737418240
          set_env_value CLEANUP_DISK_HIGH_WATERMARK_PERCENT 80
          set_env_value CLEANUP_DISK_LOW_WATERMARK_PERCENT 75
          set_env_value CLEANUP_DISK_MIN_AGE_HOURS 6
          set_env_value VOLCENGINE_TOS_PRESIGN_EXPIRES_SECONDS 21600
          set_env_value MODEL_PLAZA_GPU_STATUS_FAILURES 12
          set_env_value MODEL_PLAZA_GPU_DOWNLOAD_RETRIES 3
          set_env_value MODEL_PLAZA_GPU_DOWNLOAD_RETRY_BACKOFF_SECONDS 5

          if [ "${DEPLOY_BUILD_MIRRORS:-0}" = "1" ]; then
            set_env_from_main STORAGE_BACKEND
            set_env_from_main MODEL_PLAZA_GPU_API_URL
            set_env_from_main VOLCENGINE_TOS_AK
            set_env_from_main VOLCENGINE_TOS_SK
            set_env_from_main VOLCENGINE_TOS_BUCKET
            set_env_from_main VOLCENGINE_TOS_ENDPOINT
            set_env_from_main VOLCENGINE_TOS_REGION
            set_env_from_main VOLCENGINE_TOS_PUBLIC_BASE_URL
            set_env_from_main VOLCENGINE_TOS_PRESIGN_EXPIRES_SECONDS
          fi

          if [ "${DEPLOY_BUILD_MIRRORS:-0}" = "1" ]; then
            set_env_value APT_MIRROR http://mirrors.ivolces.com/debian
            set_env_value APT_SECURITY_MIRROR http://mirrors.ivolces.com/debian-security
            set_env_value PYPI_INDEX_URL https://mirrors.aliyun.com/pypi/simple
            set_env_value UV_SYNC_ARGS "--upgrade"
            set_env_value UV_BASE_IMAGE ghcr.nju.edu.cn/astral-sh/uv:python3.12-bookworm-slim
            set_env_value NPM_REGISTRY https://registry.npmmirror.com
            set_env_value WEB_PORT "$DEPLOY_WEB_PORT"
          fi

          rm -f "$main_env_file"

          ln -sfn "$shared_env" "$release_dir/.env"
          cd "$release_dir"

          worker_replicas="$(grep -E '^WORKER_REPLICAS=' .env | tail -n 1 | cut -d= -f2- || true)"
          worker_replicas="${worker_replicas:-3}"
          APP_VERSION="$GITHUB_SHA" docker compose -f docker-compose.prod.yml up -d --build --remove-orphans --scale "worker=$worker_replicas"
          docker compose -f docker-compose.prod.yml ps

          ln -sfn "$release_dir" "$DEPLOY_DIR/current"
          rm -f "$DEPLOY_DIR/release.tar.gz"
          rm -f "$DEPLOY_DIR/images.tar.gz"
          rm -rf "$DEPLOY_DIR/image-parts"
          current_release="$(readlink -f "$DEPLOY_DIR/current")"
          find "$DEPLOY_DIR/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
            | sort -rn \
            | cut -d' ' -f2- \
            | awk -v current="$current_release" 'NR > 5 && $0 != current { print }' \
            | xargs -r rm -rf
          docker image prune -f
          REMOTE
